<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* 讓網頁最外層預設就是透明的，且清除內建邊距 */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: transparent !important; /* 背景無色 */
    color-scheme: light dark;                 /* 告訴瀏覽器相容深淺色，避免強制白底 */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 輪播圖總容器 */
  .slider {
    width: 100%;
    max-width: 500px;
    height: 100%;
    max-height: 500px;
    background-color: transparent; /* 背景無色 */
    display: flex;
    flex-direction: column;   /* 圖片在上面，按鈕在下面 */
    justify-content: center;  /* 垂直置中 */
    align-items: center;      /* 水平置中 */
    box-sizing: border-box;
  }

  /* 圖片固定尺寸與自動縮比設定 */
  img {
    width: 100%;             /* 讓圖片寬度可隨容器縮小 */
    height: auto;            /* 高度依比例自動計算，防止變形 */
    max-width: 450px;        /* 限制圖片的最大固定寬度 */
    max-height: 350px;       /* 限制圖片的最大固定高度 */
    border-radius: 8px;
    object-fit: contain;     /* 保持比例置中，不裁切 */
    display: none;           /* 預設隱藏所有圖片 */
  }

  /* 當前顯示的圖片 */
  img.active {
    display: block; 
  }

  /* 按鈕群組容器 */
  .button-group {
    display: flex;           /* 讓按鈕橫向排列 */
    flex-direction: row;     /* 確保是左右平行 */
    gap: 20px;               /* 按鈕之間的間距 */
    margin-top: 20px;        /* 與圖片保持適當距離 */
  }  

  /* 按鈕基本樣式 */
  button {
    cursor: pointer;
    padding: 8px 16px;
    background: #f1f1f1;
    color: #3C3C3C;
    border: 1px solid #3C3C3C;
    border-radius: 4px;
    transition: background 0.2s;
  }

  button:hover {
    background: #e1e1e1;    /* 滑鼠懸停時變深色 */
  }
</style>
</head>
<body>

<div class="slider">
  <img src="https://three-trumpet-2cb.notion.site/image/attachment%3A6871c5f1-196c-4e2f-bd19-727a5f39f69a%3AIMG_0489.jpeg?table=block&id=38160c01-a26b-80e3-bc7d-e0509b15241a&spaceId=305695b6-5ba3-4ad0-ab4b-01c7917ccad1&width=870&userId=&cache=v2&imgBuildSrc=requestProxiedImageUrl" class="active">
  <img src="https://three-trumpet-2cb.notion.site/image/attachment%3A671209db-c5f8-4052-812c-03c0a33e03c9%3AIMG_6951.jpeg?table=block&id=38160c01-a26b-80ac-8dc4-cb454bef2387&spaceId=305695b6-5ba3-4ad0-ab4b-01c7917ccad1&width=870&userId=&cache=v2&imgBuildSrc=requestProxiedImageUrl">
  <img src="https://three-trumpet-2cb.notion.site/image/attachment%3Acc006414-0f13-4afc-a71d-2427e515babb%3AIMG_7240.jpeg?table=block&id=38160c01-a26b-8000-b63a-e08aacd203e1&spaceId=305695b6-5ba3-4ad0-ab4b-01c7917ccad1&width=870&userId=&cache=v2&imgBuildSrc=requestProxiedImageUrl">
  
  <div class="button-group">
    <button onclick="changeSlide(-1)"> ◀︎ </button>
    <button onclick="changeSlide(1)"> ▶︎ </button>
  </div>
</div>

<script>
  let currentIndex = 0;
  const slides = document.querySelectorAll('.slider img');

  function changeSlide(direction) {
    if (slides.length === 0) return; 
    slides[currentIndex].classList.remove('active');
    currentIndex = (currentIndex + direction + slides.length) % slides.length;
    slides[currentIndex].classList.add('active');
  }
</script>

</body>
</html>
